name: Build and Release

on:
  push:
    tags:
      - 'v*' # Trigger build and release on tags matching v*, like v1.0.0
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  build:
    runs-on: windows-latest

    permissions:
      contents: write # Required for creating releases

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET 8.0
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore ./InstallRouter.csproj

    - name: Build & Publish (Single File)
      run: |
        dotnet publish ./InstallRouter.csproj `
          -c Release `
          -r win-x64 `
          --self-contained false `
          -p:PublishSingleFile=true `
          -p:IncludeNativeLibrariesForSelfExtract=true `
          -o ./publish

    - name: Generate Commit Changelog
      run: |
        # Versuche das vorherige Tag zu finden
        $prevTag = git describe --tags --abbrev=0 HEAD^ 2>$null
        if ([string]::IsNullOrEmpty($prevTag)) {
            $log = git log --pretty=format:"* %s (%h)"
        } else {
            $log = git log "$prevTag..HEAD" --pretty=format:"* %s (%h)"
        }
        "### Änderungen in dieser Version:`n" | Out-File -FilePath release_notes.md -Encoding utf8
        $log | Out-File -FilePath release_notes.md -Encoding utf8 -Append

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          ./publish/InstallRouter.exe
        body_path: release_notes.md
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
