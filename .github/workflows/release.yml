name: Build and Release

on:
  push:
    tags:
      - 'v*' # Trigger build and release on tags matching v*, like v1.0.0
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  build:
    runs-on: windows-latest

    permissions:
      contents: write # Required for creating releases

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET 8.0
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore InstallRouter/InstallRouter.csproj

    - name: Build & Publish (Single File)
      run: |
        dotnet publish InstallRouter/InstallRouter.csproj `
          -c Release `
          -r win-x64 `
          --self-contained false `
          -p:PublishSingleFile=true `
          -p:IncludeNativeLibrariesForSelfExtract=true `
          -o ./publish

    - name: Compress Release Archive
      run: Compress-Archive -Path ./publish/* -DestinationPath ./InstallRouter.zip

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          ./InstallRouter.zip
          ./publish/InstallRouter.exe
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
