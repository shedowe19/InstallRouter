name: Build and Release

on:
  push:
    tags:
      - 'v*' # Trigger build and release on tags matching v*, like v1.0.0
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  build:
    runs-on: windows-latest

    permissions:
      contents: write # Required for creating releases

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET 8.0
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore ./InstallRouter.csproj

    - name: Build & Publish (Single File)
      run: |
        dotnet publish ./InstallRouter.csproj `
          -c Release `
          -r win-x64 `
          --self-contained false `
          -p:PublishSingleFile=true `
          -p:IncludeNativeLibrariesForSelfExtract=true `
          -o ./publish

    - name: Digitale Signatur (Self-Signed) anbringen
      run: |
        # Erstelle ein temporäres Code-Signing Zertifikat
        $cert = New-SelfSignedCertificate -Subject "CN=InstallRouter (Shedowe)" -Type CodeSigningCert -CertStoreLocation "Cert:\CurrentUser\My"
        
        # Signiere die EXE mit einem öffentlichen Zeitstempel-Server (Timestamping), damit die Signatur gültig bleibt
        Set-AuthenticodeSignature -FilePath "./publish/InstallRouter.exe" -Certificate $cert -TimestampServer "http://timestamp.digicert.com"
        
        # Public Key exportieren (optional zur Installation durch Nutzer)
        Export-Certificate -Cert $cert -FilePath "./publish/InstallRouter-Zertifikat.cer"

    - name: Generate Commit Changelog
      shell: bash
      run: |
        prevTag=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
        echo "### ✨ Änderungen in dieser Version:" > release_notes.md
        echo "" >> release_notes.md
        if [ -z "$prevTag" ]; then
            git log --pretty=format:"- %s (%h)" >> release_notes.md
        else
            git log "$prevTag..HEAD" --pretty=format:"- %s (%h)" >> release_notes.md
        fi

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          publish/InstallRouter.exe
          publish/InstallRouter-Zertifikat.cer
        body_path: release_notes.md
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
